<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLT India | Volunteer</title>
  <meta name="description" content="Volunteer with CLT India - Join us in transforming education for underprivileged children. Teaching, mentoring, content creation, and community outreach volunteer opportunities.">
  <meta name="keywords" content="volunteer CLT India, NGO volunteer Bangalore, education volunteer India, teaching volunteer, mentor children, volunteer opportunities Bangalore, charity volunteer India">
  <link rel="canonical" href="https://cltindia.org/volunteer.html">
  <meta property="og:title" content="Volunteer | CLT India - Join Our Mission">
  <meta property="og:description" content="Volunteer with CLT India - teaching, mentoring, content creation, and community outreach opportunities.">
  <meta property="og:url" content="https://cltindia.org/volunteer.html">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://cltindia.org/assets/Clt-Logo.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Volunteer | CLT India">
  <meta name="twitter:description" content="Volunteer opportunities with CLT India to transform education.">
  <meta name="twitter:image" content="https://cltindia.org/assets/Clt-Logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    :root { --header-h: 80px; }
    .page-hero {
      margin-top: var(--header-h);
      padding: 100px 24px 60px;
      background: linear-gradient(135deg, var(--teal) 0%, #045f5f 100%);
      text-align: center;
      color: var(--white);
    }
    .page-hero h1 { font-size: clamp(2rem, 4vw, 3rem); font-weight: 800; margin-bottom: 12px; }
    .page-hero p { font-size: 1.05rem; opacity: 0.85; max-width: 600px; margin: 0 auto; }
    .form-section { padding: 80px 24px; background: #f7fafc; }
    .form-container { max-width: 800px; margin: 0 auto; background: var(--white); border-radius: var(--radius); padding: 48px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
    .form-container h2 { font-size: 1.4rem; font-weight: 800; color: var(--dark); margin-bottom: 8px; }
    .form-container > p { color: var(--text-light); margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.9rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    .form-group label span { color: #e53e3e; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 8px; font-size: 0.95rem; outline: none; transition: var(--transition); font-family: inherit; box-sizing: border-box; background: var(--white); }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(8,143,143,0.1); }
    .form-group textarea { min-height: 120px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group .hint { font-size: 0.8rem; color: var(--text-light); margin-top: 4px; }
    .form-submit { width: 100%; padding: 16px; background: var(--teal); color: var(--white); border: none; border-radius: var(--radius); font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: var(--transition); font-family: inherit; margin-top: 8px; }
    .form-submit:hover { background: var(--teal-dark); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(8,143,143,0.3); }
    @media (max-width: 600px) { .form-container { padding: 24px; } .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="header-placeholder"></div>

  <section class="page-hero">
    <h1>Volunteer With Us</h1>
    <p>Your time and skills can create lasting change in the lives of children. Join our volunteer community today.</p>
  </section>

  <section class="form-section">
    <div class="form-container">
      <h2>Volunteer Registration</h2>
      <p>Fill in your details and we'll get back to you with volunteer opportunities that match your interests.</p>
      <form id="volunteerForm">
        <div class="form-row">
          <div class="form-group">
            <label>Full Name <span>*</span></label>
            <input type="text" id="volName" placeholder="Your full name" required>
          </div>
          <div class="form-group">
            <label>Email <span>*</span></label>
            <input type="email" id="volEmail" placeholder="Your email address" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Phone <span>*</span></label>
            <input type="tel" id="volPhone" placeholder="Your phone number" required>
          </div>
          <div class="form-group">
            <label>City <span>*</span></label>
            <input type="text" id="volCity" placeholder="Your city" required>
          </div>
        </div>
        <div class="form-group">
          <label>Area of Interest <span>*</span></label>
          <select id="volInterest" required>
            <option value="">Select an area</option>
            <option value="teaching">Teaching & Tutoring</option>
            <option value="content">Content Development</option>
            <option value="tech">Technology & IT Support</option>
            <option value="events">Events & Fundraising</option>
            <option value="admin">Administrative Support</option>
            <option value="outreach">Community Outreach</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Availability</label>
          <select id="volAvailability">
            <option value="">Select</option>
            <option value="weekdays">Weekdays</option>
            <option value="weekends">Weekends</option>
            <option value="flexible">Flexible</option>
          </select>
        </div>
        <div class="form-group">
          <label>Why do you want to volunteer?</label>
          <textarea id="volMessage" placeholder="Tell us about yourself and why you'd like to volunteer..."></textarea>
        </div>
        <button type="submit" class="form-submit">Submit Application</button>
      </form>
    </div>
  </section>

  <div id="footer-placeholder"></div>

  <script>
    document.getElementById('volunteerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Thank you for registering as a volunteer! We will reach out to you shortly.');
      this.reset();
    });
  </script>
  <script src="include.js"></script>

</body>
</html>
