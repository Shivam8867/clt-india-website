<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News &amp; Articles | CLT India</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root { --header-h: 80px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .gallery {
      margin-top: var(--header-h);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }

    .gallery a {
      display: block;
      line-height: 0;
    }

    .gallery img {
      width: 100%;
      display: block;
    }

    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>

  <div id="header-placeholder"></div>

  <div class="gallery">

    <a href="assets/news-articles/scan0001.jpg" target="_blank" style="grid-column:span 2;grid-row:span 2">
      <img src="assets/news-articles/scan0001.jpg" alt="" loading="lazy">
    </a>

    <a href="assets/news-articles/scan0005.jpg" target="_blank">
      <img src="assets/news-articles/scan0005.jpg" alt="" loading="lazy">
    </a>

    <a href="assets/news-articles/scan0006.jpg" target="_blank">
      <img src="assets/news-articles/scan0006.jpg" alt="" loading="lazy">
    </a>

    <a href="assets/news-articles/year-2000.jpg" target="_blank" style="grid-column:span 2">
      <img src="assets/news-articles/year-2000.jpg" alt="" loading="lazy">
    </a>

    <a href="assets/news-articles/scan0007.jpg" target="_blank">
      <img src="assets/news-articles/scan0007.jpg" alt="" loading="lazy">
    </a>

    <a href="assets/news-articles/technology-knows-no-boundaries.jpg" target="_blank">
      <img src="assets/news-articles/technology-knows-no-boundaries.jpg" alt="" loading="lazy">
    </a>

    <a href="assets/news-articles/page-4.jpg" target="_blank" style="grid-row:span 2">
      <img src="assets/news-articles/page-4.jpg" alt="" loading="lazy">
    </a>

    <a href="assets/news-articles/news-35.jpg" target="_blank">
      <img src="assets/news-articles/news-35.jpg" alt="" loading="lazy">
    </a>

    <a href="assets/news-articles/intel-toi.jpg" target="_blank" style="grid-column:span 2">
      <img src="assets/news-articles/intel-toi.jpg" alt="" loading="lazy">
    </a>

    <a href="assets/news-articles/blitz-india.jpg" target="_blank">
      <img src="assets/news-articles/blitz-india.jpg" alt="" loading="lazy">
    </a>

  </div>

  <div id="footer-placeholder"></div>

  <button class="scroll-top" id="scrollTop" aria-label="Scroll to top">&#8679;</button>

  <script src="script.js"></script>
  <script src="include.js"></script>
</body>
</html>
