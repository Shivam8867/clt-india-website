<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News &amp; Articles | CLT India</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root { --header-h: 80px; }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    .gallery {
      margin-top: var(--header-h);
      padding: 3rem 1.5rem;
      max-width: 1400px;
      margin-left: auto;
      margin-right: auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
    }

    .gallery a {
      display: block;
      transition: transform 0.3s ease;
    }
    .gallery a:hover {
      transform: scale(1.01);
    }

    .gallery img {
      width: 100%;
      display: block;
    }

    @media (max-width: 768px) {
      .gallery {
        grid-template-columns: 1fr;
        padding: 1.5rem 1rem;
        gap: 1.25rem;
      }
    }
  </style>
</head>
<body>

  <div id="header-placeholder"></div>

  <div class="gallery">

    <a href="assets/news-articles/scan0001.jpg" target="_blank">
      <img src="assets/news-articles/scan0001.jpg" alt="Press clipping" loading="lazy">
    </a>

    <a href="assets/news-articles/scan0005.jpg" target="_blank">
      <img src="assets/news-articles/scan0005.jpg" alt="Press clipping" loading="lazy">
    </a>

    <a href="assets/news-articles/scan0006.jpg" target="_blank">
      <img src="assets/news-articles/scan0006.jpg" alt="Press clipping" loading="lazy">
    </a>

    <a href="assets/news-articles/scan0007.jpg" target="_blank">
      <img src="assets/news-articles/scan0007.jpg" alt="Press clipping" loading="lazy">
    </a>

    <a href="assets/news-articles/year-2000.jpg" target="_blank">
      <img src="assets/news-articles/year-2000.jpg" alt="Year 2000 article" loading="lazy">
    </a>

    <a href="assets/news-articles/technology-knows-no-boundaries.jpg" target="_blank">
      <img src="assets/news-articles/technology-knows-no-boundaries.jpg" alt="Technology knows no boundaries" loading="lazy">
    </a>

    <a href="assets/news-articles/page-4.jpg" target="_blank">
      <img src="assets/news-articles/page-4.jpg" alt="Press clipping" loading="lazy">
    </a>

    <a href="assets/news-articles/news-35.jpg" target="_blank">
      <img src="assets/news-articles/news-35.jpg" alt="Press clipping" loading="lazy">
    </a>

    <a href="assets/news-articles/intel-toi.jpg" target="_blank">

    <a href="assets/news-articles/blitz-india.jpg" target="_blank">
      <img src="assets/news-articles/blitz-india.jpg" alt="Blitz India" loading="lazy">
    </a>

  </div>

  <div id="footer-placeholder"></div>

  <button class="scroll-top" id="scrollTop" aria-label="Scroll to top">&#8679;</button>

  <script src="script.js"></script>
  <script src="include.js"></script>
</body>
</html>
